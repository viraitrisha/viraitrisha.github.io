<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>V's Portfolio</title>
        <link rel="stylesheet" href="/css/main.css">
        <link type="image/x-icon" rel="icon" href="/img/favicon.ico">
        <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Krona+One&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>
    <body>
        <header>
            <img src="/img/portfolio_logo.png" alt="V's Portfolio Logo" class="logo">
            <a href="/" class="nav-link">Home</a>
            <a href="/html/about.html" class="nav-link">About</a>
            <a href="/html/work.html" class="nav-link">Works</a>
            <button id="contact-button">
                Contact Me
                <span class="arrow-circle"> →</span>
            </button>
        </header>

        <section class="contact-section">
            <div class="contact-container">
                <!-- LEFT SIDE -->
                <div class="contact-form-wrapper">
                    <h2>Contact Me</h2>
                    <form id="contact-form">
                        <div class="input-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" placeholder="Your Name" required>
                        </div>
                        <div class="input-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Your Email" required>
                        </div>
                        <div class="input-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea>
                        </div>
                        <button type="submit" class="send-btn">
                            Send Message
                            <span class="arrow-circle"> →</span>
                        </button>
                    </form>
                </div>

                <!-- RIGHT SIDE -->
                <div class="contact-theme-toggle">
                    <p class="toggle-hint">Need some light?</p>
                    <i id="theme-bulb" class="fa-regular fa-lightbulb"></i>
                    <span class="toggle-label">Click to brighten</span>
                </div>
            </div>
        </section>
        
        <footer>
            <p>&copy; 2026 Vanshika Trilok. All rights reserved.</p>
            <a href="https://github.com/viraitrisha" rel="noopener noreferrer" target="_blank">
                <i class="fa-brands fa-square-github"></i>
            </a>
        </footer>

        <script src="/js/main.js"></script>

    </body>
</html>
